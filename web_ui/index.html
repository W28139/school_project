<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>短视频热度实时监控系统 - TOP100</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #1a1a2e;
    color: #fff;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

h1 {
    text-align: center;
    color: #e94560;
}

/* 控制区 */
.controls {
    text-align: center;
    background: #16213e;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.btn-stress {
    background: #e94560;
    color: white;
    border: none;
    padding: 8px 15px;
    margin: 5px;
    border-radius: 5px;
    cursor: pointer;
}

/* 列表容器 */
.rank-list-container {
    height: 700px;
    overflow-y: auto;
    background: #16213e;
    border-radius: 10px;
}

/* 表头 */
.list-header {
    display: flex;
    background: #0f3460;
    padding: 12px 0;
    position: sticky;
    top: 0;
    z-index: 10;
}

/* 虚拟列表 */
#list-body {
    position: relative;
    height: 5000px;
}

.list-row {
    position: absolute;
    width: 100%;
    height: 50px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #0f3460;
    transition: transform 0.3s;
}

.list-row:hover {
    background: #1f4068;
}

/* 列宽 */
.col-rank { width: 10%; }
.col-id { width: 25%; }
.col-heat { width: 15%; }
.col-play { width: 15%; }
.col-like { width: 15%; }
.col-share { width: 10%; }
.col-finish { width: 10%; }

.rank-badge {
    background: #e94560;
    padding: 2px 8px;
    border-radius: 8px;
}

/* 前三名 */
.list-row[data-rank="1"] .rank-badge { background: gold; color: black; }
.list-row[data-rank="2"] .rank-badge { background: silver; color: black; }
.list-row[data-rank="3"] .rank-badge { background: #cd7f32; color: black; }
</style>
</head>

<body>

<div class="container">
<h1>短视频热度实时榜单（TOP100）</h1>

<div class="controls">
    <button class="btn-stress" onclick="stress('10k')">1万请求</button>
    <button class="btn-stress" onclick="stress('100k')">10万请求</button>
    <button class="btn-stress" onclick="stress('1m')">100万请求</button>
</div>

<div class="rank-list-container">
    <div class="list-header">
        <div class="col-rank">排名</div>
        <div class="col-id">ID</div>
        <div class="col-heat">热度</div>
        <div class="col-play">播放</div>
        <div class="col-like">点赞</div>
        <div class="col-share">分享</div>
        <div class="col-finish">完播率</div>
    </div>

    <div id="list-body"></div>
</div>

</div>

<script>

const SERVER_IP = "192.144.188.86";
const ROW_HEIGHT = 50;

let itemMap = new Map();
let fetching = false;

async function fetchRank() {
    if (fetching) return;
    fetching = true;

    try {
        const res = await fetch(`http://${SERVER_IP}:8000/api/rank`);
        const data = await res.json();

        if (Array.isArray(data)) {
            render(data);
        }

    } catch (e) {
        console.error(e);
    } finally {
        fetching = false;
    }
}

function render(data) {
    const body = document.getElementById("list-body");
    body.style.height = (data.length * ROW_HEIGHT) + "px";

    const active = new Set();

    data.forEach((item, i) => {

        const id = item.id;
        active.add(id);

        let el = itemMap.get(id);

        if (!el) {
            el = createRow(item);
            body.appendChild(el);
            itemMap.set(id, el);
        }

        el.style.transform = `translateY(${i * ROW_HEIGHT}px)`;
        el.setAttribute("data-rank", item.rank);

        update(el, item);
    });

    for (let [id, el] of itemMap) {
        if (!active.has(id)) {
            el.remove();
            itemMap.delete(id);
        }
    }
}

function createRow(item) {
    const div = document.createElement("div");
    div.className = "list-row";

    div.innerHTML = `
        <div class="col-rank"><span class="rank-badge">${item.rank}</span></div>
        <div class="col-id">${item.id}</div>
        <div class="col-heat">${(item.heat ?? 0).toFixed(2)}</div>
        <div class="col-play">${item.play ?? 0}</div>
        <div class="col-like">${item.like ?? 0}</div>
        <div class="col-share">${item.share ?? 0}</div>
        <div class="col-finish">${(item.finishRate ?? 0).toFixed(2)}</div>
    `;

    return div;
}

function update(el, item) {

    el.querySelector(".rank-badge").innerText = item.rank;
    el.querySelector(".col-heat").innerText = (item.heat ?? 0).toFixed(2);
    el.querySelector(".col-play").innerText = item.play ?? 0;
    el.querySelector(".col-like").innerText = item.like ?? 0;
    el.querySelector(".col-share").innerText = item.share ?? 0;
    el.querySelector(".col-finish").innerText = (item.finishRate ?? 0).toFixed(2);
}

async function stress(level) {
    fetch(`http://${SERVER_IP}:5000/stress/${level}`);
}

setInterval(fetchRank, 1000);
fetchRank();

</script>

</body>
</html>
